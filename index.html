<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>魂診断 | ソウルダイエット</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#150a28;--bg2:#2a1556;
  --gold:#c9a84c;--gold2:#e8d07a;
  --purple:#7c3aed;--purple2:#9f5ff8;
  --fire:#e05a2b;--fire-light:#fff3ee;--fire-mid:#f97316;
  --water:#2b7de0;--water-light:#eef5ff;--water-mid:#3b9eff;
  --wind:#2bb567;--wind-light:#eefff5;--wind-mid:#34d399;
  --earth:#7c5c1e;--earth-light:#fdf6e8;--earth-mid:#d4a017;
  --text:#1e1035;--muted:#6b5b8a;--light:#f0e8ff;
  --card:#fff;--shadow:0 8px 40px rgba(0,0,0,.28);--r:18px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;color:var(--light);overflow-x:hidden}
/* stars */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.7) 1px,transparent 1px);background-size:48px 48px;opacity:.12;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px 40px}
.screen{display:none;width:100%;max-width:460px;animation:fadeUp .35s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* LOGO */
.logo{text-align:center;margin-bottom:28px}
.logo-star{font-size:44px;line-height:1;margin-bottom:6px;display:block}
.logo-label{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.logo-title{font-size:26px;font-weight:700;color:#fff}
.logo-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:6px}

/* CARD */
.card{background:var(--card);border-radius:var(--r);padding:28px 24px;box-shadow:var(--shadow);color:var(--text)}
.card-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;text-align:center}
.card-desc{font-size:13px;color:var(--muted);line-height:1.75;text-align:center;margin-bottom:20px}

/* CHOICE BUTTONS (landing) */
.choice{display:flex;align-items:center;gap:14px;width:100%;padding:20px 18px;background:var(--card);border:2px solid rgba(255,255,255,.1);border-radius:16px;cursor:pointer;text-align:left;box-shadow:var(--shadow);transition:all .2s ease;margin-bottom:12px}
.choice:last-of-type{margin-bottom:0}
.choice:hover,.choice:active{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.choice-icon{font-size:38px;flex-shrink:0}
.choice-t{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.choice-d{font-size:12px;color:var(--muted);line-height:1.5}

/* BUTTONS */
.btn{display:block;width:100%;padding:15px 20px;border:none;border-radius:12px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s ease;text-align:center;text-decoration:none}
.btn+.btn{margin-top:10px}
.btn-primary{background:linear-gradient(135deg,#4a2c8a,var(--purple));color:#fff;box-shadow:0 4px 18px rgba(124,58,237,.4)}
.btn-primary:hover,.btn-primary:active{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,.5)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3d2800;font-weight:700;box-shadow:0 4px 18px rgba(201,168,76,.35)}
.btn-gold:hover,.btn-gold:active{transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--muted);border:1.5px solid #ddd;font-size:14px}
.btn-outline:hover{background:#f5f0ff}

/* QUIZ */
.quiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.quiz-num{font-size:12px;letter-spacing:2px;color:var(--gold)}
.quiz-frac{font-size:12px;color:rgba(255,255,255,.45)}
.progress{height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .35s ease}
.quiz-card{background:var(--card);border-radius:var(--r);padding:26px 22px;box-shadow:var(--shadow)}
.quiz-q{font-size:16px;font-weight:700;color:var(--text);line-height:1.65;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;background:#f6f2ff;border:1.5px solid #e5dbff;border-radius:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);line-height:1.5;text-align:left;transition:all .15s ease}
.opt:hover,.opt:active{background:#ede4ff;border-color:var(--purple)}
.opt-n{font-size:11px;font-weight:700;color:#9575cd;flex-shrink:0;min-width:16px;padding-top:1px}
.encourage{text-align:center;padding:10px 0 14px;font-size:13px;color:var(--gold2);animation:pop .4s ease}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

/* THEME INPUT */
.inp{width:100%;padding:13px 15px;font-family:'Noto Sans JP',sans-serif;font-size:16px;border:2px solid #e0d4f5;border-radius:10px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:6px}
.inp:focus{border-color:var(--purple)}
.inp-hint{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.err{background:#fff5f5;border:1px solid #ffcccc;border-radius:8px;padding:11px 13px;font-size:13px;color:#c0392b;line-height:1.6;margin-top:10px}

/* LOADING */
.loading{text-align:center;padding:60px 0}
.spinner{width:52px;height:52px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:14px;color:rgba(255,255,255,.6)}

/* RESULT TYPE */
.res-head{text-align:center;margin-bottom:20px}
.res-emoji{font-size:62px;line-height:1;margin-bottom:8px}
.res-badge{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.res-name{font-size:30px;font-weight:700;margin-bottom:4px}
.res-tag{font-size:13px;color:var(--muted)}
.divider{height:1px;background:linear-gradient(90deg,transparent,#ddd,transparent);margin:18px 0}
.points{display:flex;flex-direction:column;gap:13px}
.pt{display:flex;gap:10px;align-items:flex-start}
.pt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.pt-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.pt-txt{font-size:14px;color:var(--text);line-height:1.6}

/* Type colors */
.t-fire .res-name,.t-fire .pt-lbl{color:var(--fire)}
.t-fire .pt-dot{background:var(--fire)}
.t-water .res-name,.t-water .pt-lbl{color:var(--water)}
.t-water .pt-dot{background:var(--water)}
.t-wind .res-name,.t-wind .pt-lbl{color:var(--wind)}
.t-wind .pt-dot{background:var(--wind)}
.t-earth .res-name,.t-earth .pt-lbl{color:var(--earth)}
.t-earth .pt-dot{background:var(--earth)}

/* RESULT THEME */
.theme-head{text-align:center;margin-bottom:16px}
.theme-code{display:inline-block;background:linear-gradient(135deg,#4a2c8a,var(--purple));color:#fff;font-size:15px;font-weight:700;padding:5px 16px;border-radius:20px;margin-bottom:10px}
.theme-name{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.theme-zodiac{font-size:12px;color:var(--muted);margin-bottom:14px}
.theme-group{font-size:12px;background:#f4eeff;color:var(--purple);border-radius:6px;display:inline-block;padding:4px 10px;margin-bottom:14px;font-weight:500}
.theme-mission{font-size:14px;color:var(--text);line-height:1.85;border-left:3px solid var(--purple);padding-left:12px}

/* CTA */
.cta-box{background:linear-gradient(135deg,#f4eeff,#fdf6ff);border:1px solid #ddd1ff;border-radius:12px;padding:18px 16px;margin-top:18px;text-align:center}
.cta-msg{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px}
/* TODO: 誘導先URLを設定するときはここのボタンのonclickを変更 */
.btn-cta{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#3d2800;font-weight:700;border:none;border-radius:10px;padding:14px;width:100%;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;box-shadow:0 3px 14px rgba(201,168,76,.35);transition:all .2s}
.btn-cta:hover{transform:translateY(-1px)}

/* SCORE PILLS */
.score-row{display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.score-pill{display:flex;flex-direction:column;align-items:center;padding:8px 12px;background:#f6f2ff;border-radius:8px;min-width:58px}
.score-pill-n{font-size:19px;font-weight:700;color:var(--text)}
.score-pill-l{font-size:11px;color:var(--muted)}
.score-pill.top{background:#ede4ff;border:1.5px solid var(--purple)}
.score-pill.top .score-pill-n{color:var(--purple)}

/* MISC */
.back{display:block;text-align:center;color:rgba(255,255,255,.4);font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline}
.back:hover{color:rgba(255,255,255,.7)}
.footer{text-align:center;font-size:11px;color:rgba(255,255,255,.25);margin-top:22px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
</style>
</head>
<body>
<div id="app">

<!-- ===== LANDING ===== -->
<div id="s-landing" class="screen active">
  <div class="logo">
    <span class="logo-star">✨</span>
    <div class="logo-label">Soul Diet</div>
    <div class="logo-title">魂診断</div>
    <div class="logo-sub">あなたの魂の声を聞いてみましょう</div>
  </div>
  <button class="choice" onclick="startQuiz()">
    <span class="choice-icon">🌟</span>
    <div>
      <div class="choice-t">魂タイプ診断（簡易版）</div>
      <div class="choice-d">5問の質問で、あなたの魂タイプ（火・水・風・地）を診断します</div>
    </div>
  </button>
  <button class="choice" onclick="showScreen('s-theme')">
    <span class="choice-icon">🔮</span>
    <div>
      <div class="choice-t">魂テーマ診断（簡易版）</div>
      <div class="choice-d">生年月日から、あなたの魂テーマ（今生の使命）を診断します</div>
    </div>
  </button>
  <div class="footer">ソウルダイエット｜白男川ユキ</div>
</div>

<!-- ===== QUIZ ===== -->
<div id="s-quiz" class="screen">
  <div style="background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:rgba(255,255,255,.75);line-height:1.7;text-align:center">
    この診断は魂のタイプ（風・火・水・地）を診断するための<br>簡易ショート版です✨<br>本来の20問の診断の中から代表的な5問に答えてください
  </div>
  <div class="quiz-meta">
    <span class="quiz-num" id="q-num">QUESTION 1</span>
    <span class="quiz-frac" id="q-frac">1 / 5</span>
  </div>
  <div class="progress"><div class="progress-bar" id="q-bar" style="width:20%"></div></div>
  <div id="encourage"></div>
  <div class="quiz-card">
    <div class="quiz-q" id="q-text"></div>
    <div class="opts" id="q-opts"></div>
  </div>
  <span class="back" onclick="showScreen('s-landing')">← トップに戻る</span>
</div>

<!-- ===== THEME INPUT ===== -->
<div id="s-theme" class="screen">
  <div class="logo">
    <span class="logo-star">🔮</span>
    <div class="logo-title" style="font-size:22px">魂テーマ診断</div>
  </div>
  <div class="card">
    <div class="card-title">生年月日を入力してください</div>
    <div class="card-desc">生年月日から、あなたの今生の使命（魂テーマ）を読み解きます</div>
    <input class="inp" id="bd-input" type="text" placeholder="例：1980年7月24日" oninput="clearErr()">
    <div class="inp-hint">西暦で入力してください（例：1980/7/24・19800724・1980年7月24日）</div>
    <div id="bd-err"></div>
    <button class="btn btn-primary" onclick="diagnose()">診断する</button>
    <button class="btn btn-outline mt12" onclick="showScreen('s-landing')">← 戻る</button>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="s-loading" class="screen">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-t">魂テーマを読み解いています…</div>
  </div>
</div>

<!-- ===== RESULT TYPE ===== -->
<div id="s-res-type" class="screen">
  <div id="type-card"></div>
  <span class="back" onclick="showScreen('s-landing')">← トップに戻る</span>
</div>

<!-- ===== RESULT THEME ===== -->
<div id="s-res-theme" class="screen">
  <div class="card" id="theme-card"></div>
  <span class="back" onclick="showScreen('s-landing')">← トップに戻る</span>
</div>

</div><!-- /app -->

<script>
// ============================================================
// DATA
// ============================================================

const QS = [
  {q:"あなたが物事を始めるときの傾向は？",o:["思いついたらすぐ行動","なんとなく気分が乗ったときに始める","周りの人の様子や気持ちを見てから","計画を立ててから慎重に進める"]},
  {q:"あなたが落ち着くと感じるのはどんな時間？",o:["情熱を燃やして何かに打ち込んでいる時間","自由に好きなことをしている時間","誰かとゆっくり話をしている時間","片づけや家事など、地に足がついた時間"]},
  {q:"決断するとき、あなたはどうする？",o:["直感と勢いで即決！","気分や流れにまかせる","感情や人間関係を大事にして決める","情報を集めて冷静に判断する"]},
  {q:"ストレスがたまったとき、どうなる？",o:["イライラして爆発しがち","飽きて違うことに逃げたくなる","気づいたら涙が出ていた","一人で抱え込んで動けなくなる"]},
  {q:"人から「あなたって○○だね」と言われがちなことは？",o:["エネルギッシュ・リーダータイプ","アイデアマン・自由人","優しい・親しみやすい","しっかり者・堅実派"]}
];
// option index: 0=火 1=風 2=水 3=地

const TYPES = {
  wind:{
    emoji:"🌪",name:"風タイプ",tag:"自由・創造・好奇心・軽やかさ",cls:"t-wind",
    intro:"風タイプは、自由・創造・好奇心・軽やかさのエネルギーに満ちた魂タイプです。",
    pts:[
      {l:"性格傾向",t:"好奇心旺盛で社交的。アイデアが豊富で変化を楽しめる半面、飽きっぽさも。"},
      {l:"体の傾向",t:"肩や首が凝りやすく冷えやすい。脂肪がつきやすく気分の波でエネルギーが変動しやすい。"},
      {l:"行動特性",t:"気分屋でアイデア重視。ルーティンが苦手で自由を好む。"},
      {l:"ダイエット傾向",t:"三日坊主・情報ジプシーになりがち。「楽しさ」と「変化」がカギ。"},
      {l:"おすすめ",t:"バリエーション豊かなメニューと小さな目標で達成感を積み上げましょう。"}
    ]
  },
  fire:{
    emoji:"🔥",name:"火タイプ",tag:"情熱・達成意欲・自己実現",cls:"t-fire",
    intro:"火タイプは、情熱・達成意欲・自己実現への力に満ちた魂タイプです。",
    pts:[
      {l:"性格傾向",t:"情熱的で目標志向。行動力があるが短気になることも。"},
      {l:"体の傾向",t:"筋肉質でエネルギッシュ。胃腸を酷使しやすく上半身に熱がこもりがち。"},
      {l:"行動特性",t:"チャレンジ好きで競争心が強く、結果を重視するタイプ。"},
      {l:"ダイエット傾向",t:"燃え尽き・過剰トレーニング・短期極端な頑張りでリバウンドしやすい。"},
      {l:"おすすめ",t:"短期集中で達成感を得つつ、クールダウンの時間をしっかり取りましょう。"}
    ]
  },
  water:{
    emoji:"💧",name:"水タイプ",tag:"感受性・共感・つながり・癒し",cls:"t-water",
    intro:"水タイプは、感受性・共感・つながり・癒しのエネルギーに満ちた魂タイプです。",
    pts:[
      {l:"性格傾向",t:"共感力が高く感受性豊か。内向的で流されやすい面も。"},
      {l:"体の傾向",t:"むくみや冷えが出やすく、月経トラブルを抱える方も多い。"},
      {l:"行動特性",t:"サポート役として人を支えるのが得意。感情優先で変化には慎重。"},
      {l:"ダイエット傾向",t:"ストレス食いや気持ち優先で計画が崩壊しやすい。"},
      {l:"おすすめ",t:"温め・巡らせ・感情ログを意識。仲間と一緒に取り組むと続きやすい。"}
    ]
  },
  earth:{
    emoji:"🌱",name:"地タイプ",tag:"安定・信頼・継続・包容力",cls:"t-earth",
    intro:"地タイプは、安定・信頼・継続・包容力のエネルギーに満ちた魂タイプです。",
    pts:[
      {l:"性格傾向",t:"安定志向で実直。継続力があり信頼されやすいが慎重すぎる面も。"},
      {l:"体の傾向",t:"骨格がしっかりしていて代謝がゆっくりめ。むくみは特に下半身に出やすい。"},
      {l:"行動特性",t:"計画を立てるのが得意で習慣化が上手。変化や急な予定は苦手。"},
      {l:"ダイエット傾向",t:"マンネリ・ご褒美過多・停滞を感じると諦めやすい。"},
      {l:"おすすめ",t:"小さな改善を積み重ねるスタイルが◎。地台を整えることが安定につながります。"}
    ]
  }
};

const THEMES = {
  "1-1":{name:"自分に専念",zodiac:"牡羊座",group:"火をつける",mission:"自らの直感や情熱を信じ、魂に従って行動することで光を発揮する。嫌われてもいい、本音を語ることがあなたの使命。"},
  "1-2":{name:"愛を与え自己主張",zodiac:"獅子座",group:"火をつける",mission:"魂の情熱を大切にし、自らの人生を主役として生きる。魂が喜ぶことに飛び込むことで、周囲にも光を与える。"},
  "1-3":{name:"知識を探求し広める",zodiac:"射手座",group:"火をつける",mission:"知識を探求し、それを真理として広める人生を生きる。本質に忠実な行動こそが魂の喜び。"},
  "2-1":{name:"しっかりお金を稼ぐ",zodiac:"牡牛座",group:"地に足をつけ体現する",mission:"現実の豊かさを通じて、自分の人生を確かなものにしていく。目の前の暮らしの中に喜びを見出すことが魂の安定と繁栄をもたらす。"},
  "2-2":{name:"現実的に解決する",zodiac:"乙女座",group:"地に足をつけ体現する",mission:"地に足のついた生活と奉仕を実践する。自分を整え、できることで人に貢献する姿勢が魂の充足をもたらす。"},
  "2-3":{name:"結果にコミット",zodiac:"山羊座",group:"地に足をつけ体現する",mission:"感情に流されることなく自分を律し、社会的な責任を果たすことで魂が満たされる。自立した人生を築き、結果を出す力強さが鍵。"},
  "3-1":{name:"相手を理解し喜ばれる",zodiac:"双子座",group:"他者と関わる",mission:"相手の気持ちやレベルに寄り添った言葉で伝えることが魂の成長を促す。人と心を通わせる中で自分の表現力が育まれる。"},
  "3-2":{name:"弱い自分をさらけ出す",zodiac:"天秤座",group:"他者と関わる",mission:"他者と対話・協調・パートナーシップを築くことが人生のテーマ。相手の世界やリズムを尊重し、関係性の中で自分を育てていく。"},
  "3-3":{name:"皆のことを考えて行動",zodiac:"水瓶座",group:"他者と関わる",mission:"フラットな視点で人と関わり、社会に役立つ生き方を探求する。他人を輝かせることで自分も満たされる。"},
  "4-1":{name:"他者を信頼し本音を伝える",zodiac:"蟹座",group:"全体に浸透させる",mission:"「感じること・つながること」に自分の存在価値を見出す。弱さを見せて人と心を通わせる体験が魂の喜びに変わる。"},
  "4-2":{name:"心地よさから出る",zodiac:"蠍座",group:"全体に浸透させる",mission:"表面的な豊かさや安定を超えて、魂が共鳴する関係性を深く築くこと。変容することが魂の課題であり、喜び。"},
  "4-3":{name:"喜びを受け取り与える",zodiac:"魚座",group:"全体に浸透させる",mission:"感性・直感・夢を信じる生き方を選ぶことで魂が覚醒していく。癒しや見えない世界とのつながりを通じて、愛の存在になることがテーマ。"}
};

// ============================================================
// STATE
// ============================================================
let scores = {wind:0, fire:0, water:0, earth:0};
let qIdx = 0;

// ============================================================
// SCREENS
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz(){
  scores={wind:0,fire:0,water:0,earth:0};
  qIdx=0;
  showScreen('s-quiz');
  renderQ();
}

function renderQ(){
  const q = QS[qIdx];
  document.getElementById('q-num').textContent = `QUESTION ${qIdx+1}`;
  document.getElementById('q-frac').textContent = `${qIdx+1} / 5`;
  document.getElementById('q-bar').style.width = `${((qIdx+1)/5)*100}%`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-opts').innerHTML = q.o.map((o,i)=>`
    <button class="opt" onclick="answer(${i})">
      <span class="opt-n">${i+1}</span><span>${o}</span>
    </button>`).join('');
  const enc = document.getElementById('encourage');
  if(qIdx===3){ enc.className='encourage'; enc.textContent='あと1問！もうすぐです🌟'; }
  else enc.textContent='';
}

function answer(i){
  const keys=['fire','wind','water','earth'];
  scores[keys[i]]++;
  qIdx++;
  if(qIdx>=5) showTypeResult();
  else renderQ();
}

function showTypeResult(){
  const max = Math.max(...Object.values(scores));
  const order=['wind','fire','water','earth'];
  const tops = order.filter(k=>scores[k]===max);

  // score pills
  const pillsHtml = order.map(k=>{
    const lbl={wind:'🌪 風',fire:'🔥 火',water:'💧 水',earth:'🌱 地'};
    return `<div class="score-pill ${scores[k]===max?'top':''}"><span class="score-pill-n">${scores[k]}</span><span class="score-pill-l">${lbl[k]}</span></div>`;
  }).join('');

  let html = '';

  // --- スコアサマリーカード ---
  const headline = tops.length > 1
    ? `あなたは<strong>${tops.map(k=>TYPES[k].name).join('と')}</strong>が同点でした`
    : `あなたの魂タイプは<strong>${TYPES[tops[0]].name}</strong>でした`;

  html += `<div class="card" style="margin-bottom:14px;text-align:center">
    <div style="font-size:14px;color:var(--text);line-height:1.8;margin-bottom:14px">${headline}</div>
    <div class="score-row" style="margin-bottom:0">${pillsHtml}</div>
  </div>`;

  // --- タイプ結果カード（同点なら全タイプ分）---
  for(const key of tops){
    const t = TYPES[key];
    const ptsHtml = t.pts.map(p=>`
      <div class="pt">
        <span class="pt-dot"></span>
        <div><div class="pt-lbl">${p.l}</div><div class="pt-txt">${p.t}</div></div>
      </div>`).join('');

    html += `<div class="card ${t.cls}" style="margin-bottom:14px">
      <div class="res-head">
        <div class="res-emoji">${t.emoji}</div>
        <div class="res-badge">魂タイプ</div>
        <div class="res-name">${t.name}</div>
        <div class="res-tag">${t.tag}</div>
      </div>
      <p style="font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:16px">${t.intro}</p>
      <div class="divider"></div>
      <div class="points">${ptsHtml}</div>
    </div>`;
  }

  // --- CTAカード ---
  html += `<div class="card" style="margin-bottom:4px">
    <div class="cta-box" style="margin-top:0">
      <div class="cta-msg">もっと正確な診断結果が知りたい方は</div>
      <!-- TODO: 誘導先URLを追加する場合は下のonclickを変更してください -->
      <!-- 例: onclick="window.open('https://your-url.com','_blank')" -->
      <button class="btn-cta" onclick="showCtaMsg()">白男川先生に詳しく聞いてみる</button>
    </div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-outline" onclick="startQuiz()">もう一度診断する</button>
      <button class="btn btn-outline" onclick="showScreen('s-landing')">別の診断を試す</button>
    </div>
  </div>`;

  document.getElementById('type-card').innerHTML = html;
  showScreen('s-res-type');
}

// ============================================================
// THEME DIAGNOSIS
// ============================================================
function clearErr(){ document.getElementById('bd-err').innerHTML=''; }

async function diagnose(){
  const val = document.getElementById('bd-input').value.trim();
  if(!val){ document.getElementById('bd-err').innerHTML='<div class="err">生年月日を入力してください</div>'; return; }
  showScreen('s-loading');
  try{
    const res = await fetch('https://soul-theme-api.onrender.com/diagnose',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({birthdate:val})
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      const msg = err?.detail?.[0]?.msg || err?.detail || 'エラーが発生しました';
      showScreen('s-theme');
      document.getElementById('bd-err').innerHTML=`<div class="err">${sanitize(msg)}</div>`;
      return;
    }
    const data = await res.json();
    showThemeResult(data, val);
  } catch(e){
    showScreen('s-theme');
    document.getElementById('bd-err').innerHTML=`<div class="err">診断サーバーへの接続に失敗しました。<br>時間をおいてもう一度お試しください。<br><small>（初回アクセス時は起動に30秒ほどかかる場合があります）</small></div>`;
  }
}

function showThemeResult(data, bd){
  const code = data.soul_theme;
  const rev  = data.reverse_theme;
  const t    = THEMES[code];
  const r    = THEMES[rev];

  if(!t){ showScreen('s-theme'); document.getElementById('bd-err').innerHTML='<div class="err">診断結果の取得に失敗しました（テーマ: '+sanitize(code)+'）</div>'; return; }

  document.getElementById('theme-card').innerHTML = `
    <div class="theme-head">
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">魂テーマ診断結果</div>
      <div class="theme-code">${code}</div>
      <div class="theme-name">【${t.name}】</div>
      <div class="theme-zodiac">関連星座：${data.dragon_head_zodiac}　逆テーマ：${rev}（${r?.name||''}）</div>
      <span class="theme-group">${t.group}</span>
    </div>
    <div class="theme-mission">${t.mission}</div>
    <div class="divider"></div>
    <div style="font-size:13px;color:var(--muted);line-height:1.75">
      <strong>逆テーマ（${rev}）【${r?.name||''}】</strong>とのバランスを意識することで、魂の成長が促されます。
    </div>
    <div class="cta-box">
      <div class="cta-msg">あなたの魂テーマをさらに深く読み解きたい方は<br>白男川ユキ先生にご相談ください</div>
      <!-- TODO: 誘導先URLを追加する場合は下のonclickを変更してください -->
      <button class="btn-cta" onclick="showCtaMsg()">白男川先生に詳しく聞いてみる</button>
    </div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-outline" onclick="showScreen('s-theme');clearErr()">別の生年月日で診断する</button>
      <button class="btn btn-outline" onclick="showScreen('s-landing')">別の診断を試す</button>
    </div>`;
  showScreen('s-res-theme');
}

function showCtaMsg(){
  // TODO: ここを誘導先URLに差し替える
  // 例: window.open('https://lin.ee/xxxx', '_blank');
  alert('詳細は白男川ユキ先生までお問い合わせください');

function sanitize(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
